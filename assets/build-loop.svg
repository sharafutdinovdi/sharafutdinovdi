<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Build loop</title>
  <desc id="desc">A compact visual workflow from research to release.</desc>
  <rect width="1200" height="250" rx="24" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1198" height="248" rx="23" stroke="#D9DED4" stroke-width="2"/>
  <text x="64" y="62" fill="#171A1F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="750" letter-spacing="0">How I usually ship</text>
  <text x="64" y="94" fill="#65717C" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="450" letter-spacing="0">Turn a loose operational problem into a reproducible tool with docs, tests, and a release path.</text>
  <g transform="translate(64 136)">
    <rect width="172" height="58" rx="14" fill="#EEF4F1" stroke="#C9D8D2"/>
    <text x="24" y="36" fill="#2B675D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0">Research</text>
  </g>
  <path d="M258 165H320" stroke="#ADB8C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M312 157L320 165L312 173" stroke="#ADB8C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(340 136)">
    <rect width="172" height="58" rx="14" fill="#F7F0DF" stroke="#E6D3A5"/>
    <text x="24" y="36" fill="#835F17" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0">Model rules</text>
  </g>
  <path d="M534 165H596" stroke="#ADB8C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M588 157L596 165L588 173" stroke="#ADB8C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(616 136)">
    <rect width="172" height="58" rx="14" fill="#EEF1F6" stroke="#CDD6E3"/>
    <text x="24" y="36" fill="#405D80" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0">Build tool</text>
  </g>
  <path d="M810 165H872" stroke="#ADB8C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M864 157L872 165L864 173" stroke="#ADB8C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(892 136)">
    <rect width="172" height="58" rx="14" fill="#F5EEEE" stroke="#E3CECE"/>
    <text x="24" y="36" fill="#7C4949" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0">Release</text>
  </g>
